# --- High-Performance SMTP Configuration ---

# Listen on all standard SMTP ports
listen=0.0.0.0:25,0.0.0.0:465,0.0.0.0:587

# Reclaim resources from idle clients faster
inactivity_timeout=60

# Drop root privileges after binding ports for security
user=smtp
group=smtp

# Use all available CPU cores for maximum throughput
nodes=cpus

# Enable STARTTLS and implicit TLS
tls=yes

# Allow for a fast shutdown, since we have no outbound connections
force_shutdown_timeout=10

[main]
# Custom greeting banner sent to connecting clients
banner=ESMTP mx.freecustom.email Haraka SMTP Server