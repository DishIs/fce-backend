[main]

; Cache TTL in seconds for user plan information
plan_cache_ttl = 3600

; Default settings for anonymous users
anon_mailbox_size = 5
anon_mailbox_ttl = 43200 ; 12 hours

; Default settings for logged-in free users
free_mailbox_size = 10
free_mailbox_ttl = 86400 ; 24 hours
free_attachment_limit_mb = 1

; Default settings for pro users
pro_mailbox_size = 100
pro_attachment_limit_mb = 25
