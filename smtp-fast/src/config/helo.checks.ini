# --- CORRECT High-Speed HELO Checks Configuration ---

# This section toggles whether a check is PERFORMED.
# We are disabling all network-based checks.
[check]
forward_dns=false
rdns_match=false

# These fast, local syntax checks can remain enabled.
valid_hostname=true
bare_ip=true
dynamic=true
literal_mismatch=1
host_mismatch=true
proto_mismatch=true