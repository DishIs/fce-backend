services:
  nginx:
    image: nginx:1.22-alpine
    container_name: maildrop-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/nginx # scripts live here now
      - ./nginx/conf.d:/etc/nginx/conf.d
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
    restart: unless-stopped
    command: >
      /bin/sh -c "
        # background wizard that swaps configs when certs appear ✨
        /nginx/reload.sh &
        # nginx never dies (hopefully)
        nginx -g 'daemon off;'
      "

  certbot:
    image: certbot/certbot
    profiles: [ "manual" ]
    container_name: certbot
    volumes:
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
      - ./smtp-fast/src/config:/haraka-config
    entrypoint: /bin/sh -c
    command: >
      "certbot certonly --webroot --webroot-path=/var/www/certbot --email dishantsinghdev@icloud.com --agree-tos --no-eff-email --key-type ecdsa --elliptic-curve secp384r1 -d api2.freecustom.email -d mx.freecustom.email && echo 'Copying initial certs to Haraka config...' && cp /etc/letsencrypt/live/api2.freecustom.email/privkey.pem /haraka-config/tls_key.pem && cp /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem /haraka-config/tls_cert.pem"

  certbot-renew:
    image: certbot/certbot
    volumes:
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
      - ./smtp-fast/src/config:/haraka-config
    entrypoint: >
      sh -c "
        while :; do
          certbot renew --quiet &&
          echo 'Copying renewed certs to Haraka config...' &&
          cp /etc/letsencrypt/live/api2.freecustom.email/privkey.pem /haraka-config/tls_key.pem &&
          cp /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem /haraka-config/tls_cert.pem &&
          pkill -HUP haraka;
          sleep 12h;
        done
      "
    depends_on:
      - nginx
      - haraka
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: maildrop-api
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_URL: https://www.freecustom.email
    expose:
      - "3000"
    restart: unless-stopped

  cleanup:
    build:
      context: ./api
    container_name: maildrop-cleanup
    command: >
      sh -c "
        echo 'Cleanup worker started';
        while true; do
          node dist/cleanup-job.js;
          echo 'Cleanup finished. Sleeping 24h...';
          sleep 86400;
        done
      "
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
    depends_on:
      - mongo
    restart: unless-stopped

  domain-verifier:
    build:
      context: ./api
    container_name: maildrop-domain-verifier
    command: >
      sh -c "
        echo 'Domain verifier worker started';
        node dist/domain-verifier.js;
      "
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # How often to sweep — default 6h, tweak as needed
      VERIFY_INTERVAL_MS: 21600000
      # Revoke after this many consecutive failing sweeps (guards DNS flaps)
      FAILURE_THRESHOLD: 2
      OUR_MX_SUFFIX: mx.freecustom.email
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_URL: https://www.freecustom.email
      MAIL_DISABLED: "true" # flip to "true" in staging

    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  redis-cleanup:
    build:
      context: ./api
    container_name: maildrop-redis-cleanup
    command: >
      sh -c "
        echo 'Redis cleanup worker started';
        node dist/redis-cleanup.js;
      "
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # How often to sweep — 6h default, first run nukes the backlog immediately
      REDIS_CLEANUP_INTERVAL_MS: 21600000
    depends_on:
      - redis
    restart: unless-stopped

  subscription-expiry:
    build:
      context: ./api
    container_name: maildrop-subscription-expiry
    command: >
      sh -c "
        echo 'Subscription expiry worker started';
        node dist/subscription-expiry.js;
      "
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # How often to sweep (default 6h)
      EXPIRY_INTERVAL_MS: 21600000
      # Must match queue.redis.ini
      FREE_MAILBOX_SIZE: 20
      FREE_MAILBOX_TTL: 86400
      PLAN_CACHE_TTL: 3600
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_URL: https://www.freecustom.email
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  haraka:
    build:
      context: ./smtp-fast
    container_name: maildrop-smtp
    ports:
      - "25:25"
      - "587:587"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
    volumes:
      - ./smtp-fast/src/config:/smtp-fast/src/config
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_server
    ports:
      - "6379:6379"
    command: [ "redis-server", "--bind", "0.0.0.0", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    restart: unless-stopped
    volumes:
      - maildrop_redis_data:/data

  mongo:
    image: mongo:7
    container_name: mongo_server
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: freecustomemail
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - maildrop_mongo_data:/data/db

volumes:
  maildrop_mongo_data:
  maildrop_redis_data:
  certs:
