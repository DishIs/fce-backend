version: "3.9"

services:
  haraka:
    build:
      context: ./smtp-fast
    container_name: maildrop-smtp
    # For SMTP, we keep host networking for direct port 25, 465, 587 binding
    network_mode: host
    environment:
      REDIS_HOST: localhost
      MONGO_URI: mongodb://localhost:27017/maildb
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: maildrop-api
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      MONGO_URI: mongodb://mongo:27017/maildb
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_server
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo_server
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
