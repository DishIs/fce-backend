services:
  nginx:
    image: nginx:1.22-alpine
    container_name: maildrop-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
    depends_on:
      - api
    restart: unless-stopped
    # ---- START: REPLACE THE COMMAND WITH THIS ----
    command: >
      /bin/sh -c "
        echo 'Starting Nginx startup script...'
        # Start with a temporary config that only serves HTTP for the challenge
        cp /etc/nginx/conf.d/temp.conf /etc/nginx/conf.d/default.conf
        
        # Start Nginx in the background
        nginx &
        
        # Wait for the certificate to be generated
        echo 'Waiting for certificate...'
        while [ ! -f /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem ]; do
          sleep 2;
        done;
        
        echo 'Certificate found!'
        
        # Use the real, full configuration now
        cp /etc/nginx/conf.d/default.conf.original /etc/nginx/conf.d/default.conf
        
        # Reload Nginx with the full config
        nginx -s reload
        
        # Bring the background Nginx process to the foreground
        wait %1
      "
    # ---- END: REPLACE THE COMMAND ----

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
      - ./smtp-fast/src/config:/haraka-config # Add this line
    entrypoint: /bin/sh -c
    # Modified command to copy certs after creation
    command: >
      "certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email dishantsinghdev@gmail.com
      --agree-tos --no-eff-email
      --key-type ecdsa --elliptic-curve secp384r1
      -d api2.freecustom.email
      -d mail.freecustom.email &&
      echo 'Copying initial certs to Haraka config...' &&
      cp /etc/letsencrypt/live/api2.freecustom.email/privkey.pem /haraka-config/tls_key.pem &&
      cp /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem /haraka-config/tls_cert.pem"

  certbot-renew:
    image: certbot/certbot
    volumes:
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
      - ./smtp-fast/src/config:/haraka-config # Add this line
    # Modified entrypoint to copy certs after renewal
    entrypoint: >
      sh -c "
        while :; do
          certbot renew --quiet &&
          echo 'Copying renewed certs to Haraka config...' &&
          cp /etc/letsencrypt/live/api2.freecustom.email/privkey.pem /haraka-config/tls_key.pem &&
          cp /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem /haraka-config/tls_cert.pem &&
          nginx -s reload &&
          pkill -HUP haraka;
          sleep 12h;
        done
      "
    depends_on:
      - nginx
      - haraka
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: maildrop-api
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "3000"
    restart: unless-stopped

  haraka:
    build:
      context: ./smtp-fast
    container_name: maildrop-smtp
    ports:
      - "25:25"
      - "587:587"
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
    volumes:
      - ./smtp-fast/src/config:/smtp-fast/src/config
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_server
    command: [ "redis-server", "--bind", "0.0.0.0", "--appendonly", "yes" ]
    restart: unless-stopped
    volumes:
      - maildrop_redis_data:/data

  mongo:
    image: mongo:7
    container_name: mongo_server
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: freecustomemail
    restart: unless-stopped
    volumes:
      - maildrop_mongo_data:/data/db

volumes:
  maildrop_mongo_data:
  maildrop_redis_data:
  certs: