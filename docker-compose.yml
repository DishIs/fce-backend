# You can remove the version: "3.9" line
services:
  haraka:
    build:
      context: ./smtp-fast
    container_name: maildrop-smtp
    ports:
      - "25:25"
      - "587:587"
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://mongo:27017/freecustomemail
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: maildrop-api
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis://redis:6379
      MONGO_URI: mongodb://mongo:27017/freecustomemail
      INTERNAL_API_KEY: your_internal_api_key
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_server
    ports:
      - "6379:6379"
    # --- CHANGE THIS LINE ---
    # Add the --appendonly flag to enable saving data to disk
    command: [ "redis-server", "--bind", "0.0.0.0", "--appendonly", "yes" ]
    restart: unless-stopped
    # --- ADD THIS SECTION ---
    # Map the redis_data volume to the directory where Redis stores its data
    volumes:
      - maildrop_redis_data:/data

  mongo:
    image: mongo:7
    container_name: mongo_server
    ports:
      - "27017:27017"
    volumes:
      - maildrop_mongo_data:/data/db
    restart: unless-stopped

# --- ADD THIS LINE ---
# Declare the new named volume
volumes:
  mongo_data:
    name: maildrop_mongo_data
  redis_data:
    name: maildrop_redis_data