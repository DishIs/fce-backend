services:
  nginx:
    image: nginx:1.22-alpine
    container_name: maildrop-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
    depends_on:
      - api
    restart: unless-stopped
    # ---- START: FINAL STABLE COMMAND ----
    command: >
      /bin/sh -c "
        # This script runs ONCE when the container starts up.
        # It prepares the correct config and then hands off control to Nginx permanently.
        
        echo 'Preparing Nginx...'
        
        # If the final certificate already exists, use the full HTTPS config.
        if [ -f /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem ]; then
          echo 'Certificate found. Using production HTTPS config.'
          # Ensure temp.conf is removed and the real one is named default.conf
          rm -f /etc/nginx/conf.d/temp.conf
          cp /etc/nginx/conf.d/default.conf.original /etc/nginx/conf.d/default.conf
        
        # Otherwise, use the temporary HTTP config for the cert challenge.
        else
          echo 'Certificate not found. Using temporary HTTP config for cert challenge.'
          cp /etc/nginx/conf.d/temp.conf /etc/nginx/conf.d/default.conf
        fi
        
        echo 'Starting Nginx...'
        # This command starts Nginx in the foreground and keeps the container alive.
        nginx -g 'daemon off;'
      "
    # ---- END: FINAL STABLE COMMAND ----

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
      - ./smtp-fast/src/config:/haraka-config
    entrypoint: /bin/sh -c
    # ---- UPDATED COMMAND WITH NEW DOMAIN ----
    command: >
      "certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email you@example.com
      --agree-tos --no-eff-email
      --key-type ecdsa --elliptic-curve secp384r1
      -d api2.freecustom.email
      -d mx.freecustom.email &&
      echo 'Copying initial certs to Haraka config...' &&
      cp /etc/letsencrypt/live/api2.freecustom.email/privkey.pem /haraka-config/tls_key.pem &&
      cp /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem /haraka-config/tls_cert.pem"


  certbot-renew:
    image: certbot/certbot
    volumes:
      - certs:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot
      - ./smtp-fast/src/config:/haraka-config # Add this line
    # Modified entrypoint to copy certs after renewal
    entrypoint: >
      sh -c "
        while :; do
          certbot renew --quiet &&
          echo 'Copying renewed certs to Haraka config...' &&
          cp /etc/letsencrypt/live/api2.freecustom.email/privkey.pem /haraka-config/tls_key.pem &&
          cp /etc/letsencrypt/live/api2.freecustom.email/fullchain.pem /haraka-config/tls_cert.pem &&
          nginx -s reload &&
          pkill -HUP haraka;
          sleep 12h;
        done
      "
    depends_on:
      - nginx
      - haraka
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: maildrop-api
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "3000"
    restart: unless-stopped

  haraka:
    build:
      context: ./smtp-fast
    container_name: maildrop-smtp
    ports:
      - "25:25"
      - "587:587"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/freecustomemail?authSource=admin
    volumes:
      - ./smtp-fast/src/config:/smtp-fast/src/config
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_server
    command: [
      "redis-server",
      "--bind", "0.0.0.0",
      "--appendonly", "yes",
      "--requirepass", "${REDIS_PASSWORD}"
    ]
    restart: unless-stopped
    volumes:
      - maildrop_redis_data:/data

  mongo:
    image: mongo:7
    container_name: mongo_server
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: freecustomemail
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - maildrop_mongo_data:/data/db

volumes:
  maildrop_mongo_data:
  maildrop_redis_data:
  certs:
